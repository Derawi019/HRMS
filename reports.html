<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reports – HRMS Suite</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=8" />
  <script src="./js/hrms-config.js"></script>
</head>
<body>
<div id="hrmsMount"></div>
<template id="pageTemplate">
        <section class="screen active">
          <div class="screen-top">
            <h2 class="screen-title">Reports & Downloads</h2>
            <div class="btn-group">
              <button class="btn btn-outline export-btn" data-type="csv">Download All CSV</button>
              <button class="btn btn-outline export-btn" data-type="pdf">Download All PDF</button>
            </div>
          </div>
          <div class="grid-2">
            <div class="card report-card">
              <div class="report-icon blue"><svg viewBox="0 0 24 24" width="32" height="32"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67V7z" fill="currentColor"/></svg></div>
              <h3>Attendance Report</h3><p>Monthly attendance trends, late arrivals, and absences.</p>
              <div class="btn-group"><button class="btn btn-sm btn-outline export-btn" data-type="csv">CSV</button><button class="btn btn-sm btn-outline export-btn" data-type="pdf">PDF</button></div>
            </div>
            <div class="card report-card">
              <div class="report-icon green"><svg viewBox="0 0 24 24" width="32" height="32"><path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z" fill="currentColor"/></svg></div>
              <h3>Payroll Report</h3><p>Disbursement summary, deductions, and net pay breakdown.</p>
              <div class="btn-group"><button class="btn btn-sm btn-outline export-btn" data-type="csv">CSV</button><button class="btn btn-sm btn-outline export-btn" data-type="pdf">PDF</button></div>
            </div>
            <div class="card report-card">
              <div class="report-icon purple"><svg viewBox="0 0 24 24" width="32" height="32"><path d="M19 3H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2V5a2 2 0 00-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z" fill="currentColor"/></svg></div>
              <h3>Performance Report</h3><p>Rating distribution, goal progress, and peer review summary.</p>
              <div class="btn-group"><button class="btn btn-sm btn-outline export-btn" data-type="csv">CSV</button><button class="btn btn-sm btn-outline export-btn" data-type="pdf">PDF</button></div>
            </div>
            <div class="card report-card">
              <div class="report-icon orange"><svg viewBox="0 0 24 24" width="32" height="32"><path d="M19 3h-1V1h-2v2H8V1H6v2H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2V5a2 2 0 00-2-2zm0 16H5V8h14v11zM9 10H7v2h2v-2zm4 0h-2v2h2v-2zm4 0h-2v2h2v-2z" fill="currentColor"/></svg></div>
              <h3>Leave Utilization</h3><p>Leave balance, utilization rates, and trends by department.</p>
              <div class="btn-group"><button class="btn btn-sm btn-outline export-btn" data-type="csv">CSV</button><button class="btn btn-sm btn-outline export-btn" data-type="pdf">PDF</button></div>
            </div>
          </div>
        </section>

        
</template>
<script type="module" src="./js/boot/reports.js"></script>
</body>
</html>
