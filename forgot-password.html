<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HRMS Suite – Forgot password</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=9" />
  <script src="./js/hrms-config.js?v=2"></script>
</head>
<body>
  <div class="login-page" id="forgotPage">
    <div class="login-bg-pattern"></div>
    <div class="login-container" style="max-width: 440px; margin: 3rem auto;">
      <div class="login-card">
        <div class="login-card-header">
          <h2>Forgot password</h2>
          <p>Enter your work email. If SMTP is configured on the server, you will receive a reset link.</p>
        </div>
        <form id="forgotForm">
          <label class="form-field">
            <span>Email</span>
            <input type="email" id="forgotEmail" placeholder="you@company.com" required />
          </label>
          <div class="login-error" id="forgotError"></div>
          <button type="submit" class="btn btn-primary login-submit" style="width:100%">Send reset link</button>
          <p style="margin-top:1rem;text-align:center;font-size:.85rem;"><a href="login.html">Back to sign in</a></p>
        </form>
      </div>
    </div>
  </div>
  <script type="module" src="./js/pages/forgot-password-page.js"></script>
</body>
</html>
