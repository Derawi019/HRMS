name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: hrms
          POSTGRES_PASSWORD: hrms
          POSTGRES_DB: hrms
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hrms -d hrms"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://hrms:hrms@127.0.0.1:5432/hrms
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt ruff
      - name: Ruff
        run: ruff check app tests
      - name: Migrate and seed
        env:
          PYTHONPATH: .
        run: python -m alembic upgrade head && python scripts/seed.py
      - name: Pytest
        env:
          PYTHONPATH: .
        run: pytest tests -q

  docker-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: false
          tags: hrms-api:ci
