# Postgres + HRMS API. Typical first run:
#   docker compose up -d postgres
#   docker compose run --rm api alembic upgrade head
#   docker compose run --rm api python scripts/seed.py
#   docker compose up -d api
#
# Frontend: serve this folder on port 8000 (or any static host),
# optionally set window.__HRMS_API__ via js/hrms-config.js to http://localhost:8787

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hrms
      POSTGRES_PASSWORD: hrms
      POSTGRES_DB: hrms
    ports:
      - "5433:5432"
    volumes:
      - hrms_pgdata:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql://hrms:hrms@postgres:5432/hrms
      JWT_SECRET: docker-dev-change-me-at-least-32-chars-long
      CORS_ORIGINS: http://127.0.0.1:8000,http://localhost:8000,http://127.0.0.1:5500,http://localhost:5500
    depends_on:
      - postgres
    ports:
      - "8787:8000"

volumes:
  hrms_pgdata:
