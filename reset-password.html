<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HRMS Suite – Set password</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=9" />
  <script src="./js/hrms-config.js?v=2"></script>
</head>
<body>
  <div class="login-page" id="resetPage">
    <div class="login-bg-pattern"></div>
    <div class="login-container" style="max-width: 440px; margin: 3rem auto;">
      <div class="login-card">
        <div class="login-card-header">
          <h2>Set new password</h2>
          <p>Use the link from your email. Choose a password that meets your organization’s minimum length.</p>
        </div>
        <form id="resetForm">
          <input type="hidden" id="resetToken" />
          <label class="form-field">
            <span>New password</span>
            <input type="password" id="resetPassword" autocomplete="new-password" required minlength="1" />
          </label>
          <div class="login-error" id="resetError"></div>
          <button type="submit" class="btn btn-primary login-submit" style="width:100%">Update password</button>
          <p style="margin-top:1rem;text-align:center;font-size:.85rem;"><a href="login.html">Back to sign in</a></p>
        </form>
      </div>
    </div>
  </div>
  <script type="module" src="./js/pages/reset-password-page.js"></script>
</body>
</html>
